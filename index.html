<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larp Central</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f14;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    background: #15151d;
    position: sticky;
    top: 0;
    backdrop-filter: blur(10px);
}

nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 20px 0;
    flex-wrap: wrap;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 12px;
    background: #1f1f2a;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 500;
}

button:hover {
    background: #34344a;
    transform: translateY(-1px);
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
    padding: 20px;
}

.card {
    background: #1a1a24;
    border-radius: 16px;
    overflow: hidden;
    transition: 0.2s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.card:hover {
    transform: scale(1.03);
}

.card img, .card video {
    width: 100%;
    height: 220px;
    object-fit: cover;
    background: #000;
}

.card .content {
    padding: 12px;
}

.card h3 {
    margin: 0 0 6px;
    font-size: 16px;
}

.card p {
    font-size: 13px;
    opacity: 0.8;
    line-height: 1.4;
}

.loader {
    text-align: center;
    padding: 40px;
    opacity: 0.7;
}
</style>
</head>
<body>

<header>Larp Central</header>

<nav>
    <button onclick="loadContent('photos')">Photos</button>
    <button onclick="loadContent('videos')">Videos</button>
    <button onclick="loadContent('prompts')">Prompts</button>
</nav>

<div class="container" id="container"></div>

<script>
// 🔥 CHANGE THESE
const USER = "tyy-8";
const REPO = "larpcentral";
const BASE = `https://api.github.com/repos/${USER}/${REPO}/contents/public/content`;

async function loadContent(type) {
    const container = document.getElementById('container');
    container.innerHTML = '<div class="loader">Loading...</div>';

    try {
        const res = await fetch(`${BASE}/${type}`);
        const files = await res.json();

        container.innerHTML = "";

        for (let file of files) {
            const card = document.createElement('div');
            card.className = 'card';

            if (type === "photos") {
                card.innerHTML = `<img src="${file.download_url}">`;
            }

            if (type === "videos") {
                card.innerHTML = `<video controls src="${file.download_url}"></video>`;
            }

            if (type === "prompts") {
                const txt = await fetch(file.download_url).then(r => r.text());
                const lines = txt.split("\n");

                card.innerHTML = `
                    <div class="content">
                        <h3>${lines[0] || "Untitled"}</h3>
                        <p>${lines.slice(1).join(" ")}</p>
                    </div>
                `;
            }

            container.appendChild(card);
        }

    } catch (err) {
        container.innerHTML = "Failed to load content.";
        console.error(err);
    }
}

// default load
loadContent("photos");
</script>

</body>
</html>
