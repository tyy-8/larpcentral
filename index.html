<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Larp Central</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: #0b0b10;
    color: white;
    overflow: hidden;
}

/* HEADER */
header {
    position: fixed;
    top: 0;
    width: 100%;
    text-align: center;
    padding: 14px;
    font-size: 22px;
    font-weight: 700;
    z-index: 10;
    background: rgba(10,10,15,0.6);
    backdrop-filter: blur(10px);
}

/* FEED */
.feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

/* ITEM */
.item {
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* MEDIA BOX */
.media {
    width: 70%;
    max-width: 600px;
    border-radius: 16px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
    position: relative;
}

/* IMAGE / VIDEO */
.media img,
.media video {
    width: 100%;
    display: block;
    object-fit: cover;
}

/* OVERLAY UNDER MEDIA (your request) */
.overlay {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 10px;
    background: rgba(20,20,30,0.85);
}

.overlay button {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.15);
    color: white;
}

.overlay button:hover {
    background: rgba(120,80,255,0.4);
}
</style>
</head>

<body>

<header>Larp Central</header>

<div class="feed" id="feed"></div>

<script>
const USER = "tyy-8";
const REPO = "larpcentral";
const BASE = `https://api.github.com/repos/${USER}/${REPO}/contents/Photos`;

let observer;

/* LOAD ONLY PHOTOS + VIDEOS */
async function load() {
    const feed = document.getElementById("feed");
    feed.innerHTML = "Loading...";

    const res = await fetch(BASE);
    const files = await res.json();

    feed.innerHTML = "";

    for (let file of files) {

        const item = document.createElement("div");
        item.className = "item";

        // IMAGE
        if (file.name.match(/\.(jpg|png|jpeg|webp)$/)) {
            item.innerHTML = `
            <div class="media">
                <img src="${file.download_url}">
                <div class="overlay">
                    <button onclick="downloadFile('${file.download_url}','${file.name}')">Download</button>
                    <button onclick="copyLink('${file.download_url}')">Copy</button>
                </div>
            </div>`;
        }

        // VIDEO
        if (file.name.match(/\.(mp4|webm|mov)$/)) {
            item.innerHTML = `
            <div class="media">
                <video class="vid" src="${file.download_url}" muted loop playsinline></video>

                <div class="overlay">
                    <button onclick="downloadFile('${file.download_url}','${file.name}')">Download</button>
                    <button onclick="copyLink('${file.download_url}')">Copy</button>
                </div>
            </div>`;
        }

        feed.appendChild(item);
    }

    setupAutoplay();
}

/* AUTOPLAY */
function setupAutoplay() {
    const videos = document.querySelectorAll(".vid");

    observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            const v = entry.target;

            if (entry.isIntersecting) {
                v.play().catch(() => {});
            } else {
                v.pause();
            }
        });
    }, { threshold: 0.75 });

    videos.forEach(v => {
        v.muted = true;
        v.playsInline = true;
        observer.observe(v);
    });
}

/* REAL DOWNLOAD */
function downloadFile(url, name) {
    fetch(url)
        .then(r => r.blob())
        .then(blob => {
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = blobUrl;
            a.download = name;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(blobUrl);
        });
}

/* COPY */
function copyLink(url) {
    navigator.clipboard.writeText(url);
}

load();
</script>

</body>
</html>
