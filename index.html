<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larp Central</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f14);
    color: white;
    overflow-x: hidden;
}

/* glow */
body::before {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(120,80,255,0.15), transparent 60%);
    top: -200px;
    left: -200px;
    filter: blur(80px);
    animation: float 8s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(80px, 60px); }
}

header {
    padding: 24px;
    text-align: center;
    font-size: 30px;
    font-weight: 700;
}

.searchbar {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
}

.searchbar input {
    width: 60%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
}

nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
    flex-wrap: wrap;
}

button {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    cursor: pointer;
}

button:hover {
    background: rgba(120,80,255,0.25);
}

/* 🔥 GRID MODE (PINTEREST) */
.container.grid {
    column-count: 5;
    column-gap: 12px;
    padding: 16px;
}

/* 🔥 SCROLL MODE */
.container.scroll {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
}

.container.scroll .card {
    width: 420px;
    max-width: 95%;
}

/* responsive grid */
@media (max-width: 1200px) { .container.grid { column-count: 4; } }
@media (max-width: 800px) { .container.grid { column-count: 2; } }
@media (max-width: 500px) { .container.grid { column-count: 1; } }

/* CARD */
.card {
    break-inside: avoid;
    margin-bottom: 12px;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    background: rgba(255,255,255,0.05);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px) scale(1.01);
}

/* MEDIA */
.media {
    width: 100%;
    aspect-ratio: 3 / 4;
    position: relative;
    overflow: hidden;
}

.media img,
.media video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* OVERLAY */
.overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.75));
    opacity: 0;
    transition: 0.2s;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 10px;
}

.card:hover .overlay {
    opacity: 1;
}

.overlay button {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.15);
    color: white;
    backdrop-filter: blur(8px);
}

/* PROMPTS */
.content {
    padding: 12px;
}

.content h3 {
    margin: 0 0 6px;
    font-size: 15px;
}

.content p {
    font-size: 13px;
    opacity: 0.75;
}

/* toggle button */
.topbar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<header>Larp Central</header>

<div class="searchbar">
    <input id="search" placeholder="Search..." oninput="filterContent()">
</div>

<div class="topbar">
    <button onclick="loadContent('photos')">Photos</button>
    <button onclick="loadContent('videos')">Videos</button>
    <button onclick="loadContent('prompts')">Prompts</button>
    <button onclick="toggleView()">Toggle View</button>
</div>

<div class="container grid" id="container"></div>

<script>
const USER = "tyy-8";
const REPO = "larpcentral";
const BASE = `https://api.github.com/repos/${USER}/${REPO}/contents`;

let allData = [];
let currentType = "photos";
let isGrid = true;

async function loadContent(type) {
    currentType = type;
    const container = document.getElementById('container');
    container.innerHTML = "Loading...";
    allData = [];

    const folderMap = {
        photos: "Photos",
        videos: "Videos",
        prompts: "Prompts"
    };

    const res = await fetch(`${BASE}/${folderMap[type]}`);
    const files = await res.json();

    container.innerHTML = "";

    for (let file of files) {
        let item = { file };

        const card = document.createElement("div");
        card.className = "card";

        if (type === "photos") {
            card.innerHTML = `
            <div class="media">
                <img src="${file.download_url}">
                <div class="overlay">
                    <button onclick="downloadFile('${file.download_url}')">Download</button>
                    <button onclick="copyLink('${file.download_url}')">Copy</button>
                </div>
            </div>`;
        }

        if (type === "videos") {
            card.innerHTML = `
            <div class="media">
                <video src="${file.download_url}" muted></video>
                <div class="overlay">
                    <button onclick="downloadFile('${file.download_url}')">Download</button>
                    <button onclick="copyLink('${file.download_url}')">Copy</button>
                </div>
            </div>`;
        }

        if (type === "prompts") {
            const txt = await fetch(file.download_url).then(r => r.text());
            const lines = txt.split("\n");

            item.title = lines[0];
            item.text = lines.slice(1).join(" ");

            card.innerHTML = `
            <div class="content">
                <h3>${item.title}</h3>
                <p>${item.text}</p>
            </div>`;
        }

        item.element = card;
        allData.push(item);
        container.appendChild(card);
    }
}

function filterContent() {
    const value = document.getElementById("search").value.toLowerCase();
    const container = document.getElementById("container");
    container.innerHTML = "";

    allData.forEach(item => {
        const text = (item.file.name + (item.title || "") + (item.text || "")).toLowerCase();
        if (text.includes(value)) {
            container.appendChild(item.element);
        }
    });
}

/* 🔥 VIEW TOGGLE */
function toggleView() {
    const container = document.getElementById("container");

    isGrid = !isGrid;

    if (isGrid) {
        container.classList.remove("scroll");
        container.classList.add("grid");
    } else {
        container.classList.remove("grid");
        container.classList.add("scroll");
    }
}

/* actions */
function downloadFile(url) {
    const a = document.createElement("a");
    a.href = url;
    a.download = "";
    a.target = "_blank";
    a.click();
}

function copyLink(url) {
    navigator.clipboard.writeText(url);
}

loadContent("photos");
</script>

</body>
</html>
