<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larp Central</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0f0f14;
    color: white;
    overflow-x: hidden;
}

/* top UI */
header {
    padding: 18px;
    text-align: center;
    font-size: 26px;
    font-weight: 700;
}

.topbar {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding-bottom: 10px;
}

button {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    cursor: pointer;
}

button:hover {
    background: rgba(120,80,255,0.25);
}

/* =========================
   GRID MODE (Pinterest)
========================= */
.container.grid {
    column-count: 5;
    column-gap: 12px;
    padding: 16px;
}

@media (max-width: 1200px) { .container.grid { column-count: 4; } }
@media (max-width: 800px) { .container.grid { column-count: 2; } }

.card {
    break-inside: avoid;
    margin-bottom: 12px;
    border-radius: 14px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
}

/* media */
.media {
    width: 100%;
    aspect-ratio: 3 / 4;
    position: relative;
}

.media img,
.media video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* =========================
   FULLSCREEN SCROLL MODE
========================= */

.viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: #0b0b10;
    z-index: 999;
}

/* sidebar */
.sidebar {
    width: 220px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(10px);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.sidebar button {
    width: 100%;
    text-align: left;
}

/* scroll feed */
.feed {
    flex: 1;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    height: 100vh;
}

.feed-item {
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* big centered media */
.full-media {
    width: 70%;
    max-width: 600px;
    aspect-ratio: 3 / 4;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    background: rgba(255,255,255,0.05);
}

.full-media img,
.full-media video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* overlay */
.overlay {
    position: absolute;
    bottom: 10px;
    right: 10px;
    display: flex;
    gap: 8px;
}

.overlay button {
    font-size: 12px;
}

/* show viewer */
.viewer.active {
    display: flex;
}
</style>
</head>

<body>

<header>Larp Central</header>

<div class="topbar">
    <button onclick="loadContent('photos')">Photos</button>
    <button onclick="loadContent('videos')">Videos</button>
    <button onclick="loadContent('prompts')">Prompts</button>
    <button onclick="toggleMode()">Toggle Scroll Mode</button>
</div>

<!-- GRID MODE -->
<div class="container grid" id="grid"></div>

<!-- FULLSCREEN SCROLL MODE -->
<div class="viewer" id="viewer">

    <div class="sidebar">
        <button onclick="loadContent('photos')">Photos</button>
        <button onclick="loadContent('videos')">Videos</button>
        <button onclick="loadContent('prompts')">Prompts</button>
        <button onclick="toggleMode()">Exit</button>
    </div>

    <div class="feed" id="feed"></div>
</div>

<script>
const USER = "tyy-8";
const REPO = "larpcentral";
const BASE = `https://api.github.com/repos/${USER}/${REPO}/contents`;

let allData = [];
let currentType = "photos";
let scrollMode = false;

async function loadContent(type) {
    currentType = type;
    allData = [];

    const grid = document.getElementById("grid");
    const feed = document.getElementById("feed");

    grid.innerHTML = "Loading...";
    feed.innerHTML = "";

    const folderMap = {
        photos: "Photos",
        videos: "Videos",
        prompts: "Prompts"
    };

    const res = await fetch(`${BASE}/${folderMap[type]}`);
    const files = await res.json();

    grid.innerHTML = "";

    for (let file of files) {
        let item = { file };

        // ================= GRID =================
        const card = document.createElement("div");
        card.className = "card";

        if (type === "photos") {
            card.innerHTML = `
            <div class="media">
                <img src="${file.download_url}">
            </div>`;
        }

        if (type === "videos") {
            card.innerHTML = `
            <div class="media">
                <video src="${file.download_url}" muted></video>
            </div>`;
        }

        if (type === "prompts") {
            const txt = await fetch(file.download_url).then(r => r.text());
            const lines = txt.split("\n");

            card.innerHTML = `
            <div style="padding:12px">
                <h3>${lines[0]}</h3>
                <p style="opacity:0.7">${lines.slice(1).join(" ")}</p>
            </div>`;
        }

        grid.appendChild(card);

        // ================= SCROLL VIEW =================
        const feedItem = document.createElement("div");
        feedItem.className = "feed-item";

        if (type === "photos") {
            feedItem.innerHTML = `
            <div class="full-media">
                <img src="${file.download_url}">
                <div class="overlay">
                    <button onclick="downloadFile('${file.download_url}')">Download</button>
                    <button onclick="copyLink('${file.download_url}')">Copy</button>
                </div>
            </div>`;
        }

        if (type === "videos") {
            feedItem.innerHTML = `
            <div class="full-media">
                <video src="${file.download_url}" controls></video>
                <div class="overlay">
                    <button onclick="downloadFile('${file.download_url}')">Download</button>
                    <button onclick="copyLink('${file.download_url}')">Copy</button>
                </div>
            </div>`;
        }

        feed.appendChild(feedItem);
    }
}

/* TOGGLE MODE */
function toggleMode() {
    scrollMode = !scrollMode;

    const viewer = document.getElementById("viewer");

    if (scrollMode) {
        viewer.classList.add("active");
    } else {
        viewer.classList.remove("active");
    }
}

/* actions */
function downloadFile(url) {
    const a = document.createElement("a");
    a.href = url;
    a.download = "";
    a.click();
}

function copyLink(url) {
    navigator.clipboard.writeText(url);
}

loadContent("photos");
</script>

</body>
</html>
