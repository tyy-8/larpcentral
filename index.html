<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larp Central</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: #0b0b10;
    color: white;
    overflow: hidden;
}

/* HEADER */
header {
    position: fixed;
    top: 0;
    width: 100%;
    text-align: center;
    padding: 14px;
    font-size: 22px;
    font-weight: 700;
    z-index: 20;
    background: rgba(10,10,15,0.6);
    backdrop-filter: blur(12px);
}

/* CATEGORY BAR */
.topbar {
    position: fixed;
    top: 55px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
    z-index: 20;
}

.topbar button {
    padding: 8px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    cursor: pointer;
}

.topbar button:hover {
    background: rgba(120,80,255,0.25);
}

/* SIDE PANEL */
.sidepanel {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 30;
}

.sidepanel button {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: white;
    cursor: pointer;
    backdrop-filter: blur(10px);
}

.sidepanel button:hover {
    background: rgba(120,80,255,0.4);
}

/* FEED (SMOOTH SCROLL FIX) */
.feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    overscroll-behavior: contain;
}

/* ITEM (NO OVERLAP FIX) */
.item {
    height: 100vh;
    width: 100vw;
    scroll-snap-align: start;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* MEDIA CONTAINER */
.media, .prompt {
    width: min(650px, 90vw);
    max-height: 85vh;
    border-radius: 16px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
}

/* IMAGE / VIDEO FIX */
.media img,
.media video {
    width: 100%;
    height: auto;
    max-height: 85vh;
    object-fit: contain;
    background: black;
    display: block;
    
    background: transparent; /* IMPORTANT FIX */
}

/* PROMPTS */
.prompt {
    padding: 20px;
}

/* HIDE OLD OVERLAY */
.overlay { display: none; }
</style>
</head>

<body>

<header>Larp Central</header>

<div class="topbar">
    <button onclick="load('Photos')">Photos</button>
    <button onclick="load('Videos')">Videos</button>
    <button onclick="load('Prompts')">Prompts</button>
</div>

<!-- SIDE CONTROLS -->
<div class="sidepanel">
    <button onclick="downloadCurrent()">Download</button>
    <button onclick="copyCurrent()">Copy</button>
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>

<script>
const USER = "tyy-8";
const REPO = "larpcentral";
const BASE = `https://api.github.com/repos/${USER}/${REPO}/contents`;

let currentItems = [];
let currentIndex = 0;

/* LOAD */
async function load(folder) {
    const feed = document.getElementById("feed");
    feed.innerHTML = "Loading...";
    currentItems = [];

    const res = await fetch(`${BASE}/${folder}`);
    const files = await res.json();

    feed.innerHTML = "";

    for (let file of files) {

        const item = document.createElement("div");
        item.className = "item";

        const url = file.download_url;

        /* PHOTOS */
        if (folder === "Photos") {
            item.innerHTML = `
            <div class="media">
                <img src="${url}">
            </div>`;
        }

        /* VIDEOS */
        if (folder === "Videos") {
            item.innerHTML = `
            <div class="media">
                <video class="vid" src="${url}" muted loop playsinline></video>
            </div>`;
        }

        /* PROMPTS */
        if (folder === "Prompts") {
            const txt = await fetch(url).then(r => r.text());
            const lines = txt.split("\n");

            item.innerHTML = `
            <div class="prompt">
                <h2>${lines[0]}</h2>
                <p style="opacity:0.7">${lines.slice(1).join(" ")}</p>
            </div>`;
        }

        currentItems.push({ url, name: file.name });
        feed.appendChild(item);
    }

    setupObserver();
}

/* AUTOPLAY + TRACK CURRENT ITEM */
function setupObserver() {
    const items = document.querySelectorAll(".item");

    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {

                currentIndex = [...items].indexOf(entry.target);

                const video = entry.target.querySelector("video");
                if (video) {
                    video.play().catch(() => {});
                }

            } else {
                const video = entry.target.querySelector("video");
                if (video) video.pause();
            }
        });
    }, { threshold: 0.75 });

    items.forEach(i => observer.observe(i));
}

/* DOWNLOAD CURRENT */
function downloadCurrent() {
    const item = currentItems[currentIndex];
    if (!item) return;

    fetch(item.url)
        .then(r => r.blob())
        .then(blob => {
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = blobUrl;
            a.download = item.name;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(blobUrl);
        });
}

async function copyCurrent() {
    const item = currentItems[currentIndex];
    if (!item) return;

    try {
        const res = await fetch(item.url, { mode: "cors" });
        const blob = await res.blob();

        const data = [new ClipboardItem({ [blob.type]: blob })];

        await navigator.clipboard.write(data);

        showToast("Image copied ✔");
    } catch (err) {
        console.log("Image copy failed:", err);

        // fallback: download trick (works everywhere)
        await fallbackCopyAsImage(item.url);
    }
}
/* INIT */
load("Photos");
</script>

</body>
</html>
