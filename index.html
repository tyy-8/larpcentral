<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larp Central</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f14);
    color: white;
    overflow-x: hidden;
}

/* subtle animated background glow */
body::before {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(120,80,255,0.15), transparent 60%);
    top: -200px;
    left: -200px;
    filter: blur(80px);
    animation: float 8s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(80px, 60px); }
}

header {
    padding: 24px;
    text-align: center;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 1px;
}

.searchbar {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
}

.searchbar input {
    width: 60%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
    backdrop-filter: blur(10px);
}

nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 15px 0 25px;
    flex-wrap: wrap;
}

button {
    padding: 10px 16px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    color: white;
    cursor: pointer;
    transition: 0.25s;
    backdrop-filter: blur(10px);
}

button:hover {
    transform: translateY(-2px);
    background: rgba(120,80,255,0.25);
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    overflow: hidden;
    transition: 0.3s;
    backdrop-filter: blur(14px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

.card:hover {
    transform: scale(1.04);
    box-shadow: 0 20px 50px rgba(120,80,255,0.25);
}

.card img, .card video {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.card .content {
    padding: 12px;
}

.card h3 {
    margin: 0 0 6px;
    font-size: 15px;
}

.card p {
    font-size: 13px;
    opacity: 0.75;
    line-height: 1.4;
}

.loader {
    text-align: center;
    padding: 40px;
    opacity: 0.7;
}
</style>
</head>
<body>

<header>Larp Central</header>

<div class="searchbar">
    <input id="search" placeholder="Search prompts, images, videos..." oninput="filterContent()">
</div>

<nav>
    <button onclick="loadContent('photos')">Photos</button>
    <button onclick="loadContent('videos')">Videos</button>
    <button onclick="loadContent('prompts')">Prompts</button>
</nav>

<div class="container" id="container"></div>

<script>
const USER = "tyy-8";
const REPO = "larpcentral";
const BASE = `https://api.github.com/repos/${USER}/${REPO}/contents`;

let allData = [];
let currentType = "photos";

async function loadContent(type) {
    currentType = type;
    const container = document.getElementById('container');
    container.innerHTML = "Loading...";

    const folderMap = {
        photos: "Photos",
        videos: "Videos",
        prompts: "Prompts"
    };

    const res = await fetch(`${BASE}/${folderMap[type]}`);
    const files = await res.json();

    container.innerHTML = "";
    allData = [];

    for (let file of files) {
        let item = { type, file };

        const card = document.createElement("div");
        card.className = "card";

        if (type === "photos") {
            card.innerHTML = `<img src="${file.download_url}">`;
        }

        if (type === "videos") {
            card.innerHTML = `<video controls src="${file.download_url}"></video>`;
        }

        if (type === "prompts") {
            const txt = await fetch(file.download_url).then(r => r.text());
            const lines = txt.split("\n");

            item.title = lines[0];
            item.text = lines.slice(1).join(" ");

            card.innerHTML = `
                <div class="content">
                    <h3>${item.title}</h3>
                    <p>${item.text}</p>
                </div>
            `;
        }

        item.element = card;
        allData.push(item);
        container.appendChild(card);
    }
}

function filterContent() {
    const value = document.getElementById("search").value.toLowerCase();
    const container = document.getElementById("container");
    container.innerHTML = "";

    allData.forEach(item => {
        const text = (item.file.name + (item.title || "") + (item.text || "")).toLowerCase();
        if (text.includes(value)) {
            container.appendChild(item.element);
        }
    });
}

loadContent("photos");
</script>

</body>
</html>
