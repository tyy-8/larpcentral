<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larp Central</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0f0f14;
    color: white;
    overflow-x: hidden;
}

header {
    padding: 18px;
    text-align: center;
    font-size: 26px;
    font-weight: 700;
}

.topbar {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding-bottom: 10px;
}

button {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    cursor: pointer;
}

button:hover {
    background: rgba(120,80,255,0.25);
}

/* ================= GRID MODE ================= */
.container.grid {
    column-count: 5;
    column-gap: 12px;
    padding: 16px;
}

@media (max-width: 1200px) { .container.grid { column-count: 4; } }
@media (max-width: 800px) { .container.grid { column-count: 2; } }

.card {
    break-inside: avoid;
    margin-bottom: 12px;
    border-radius: 14px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
    position: relative;
}

.media {
    width: 100%;
    aspect-ratio: 3 / 4;
    position: relative;
}

.media img,
.media video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ================= FULLSCREEN MODE ================= */
.viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: #0b0b10;
    z-index: 999;
}

.viewer.active {
    display: flex;
}

/* sidebar */
.sidebar {
    width: 200px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(10px);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* feed */
.feed {
    flex: 1;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    height: 100vh;
}

.feed-item {
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    align-items: center;
    justify-content: center;
}
    
.full-media {
    width: 70%;
    max-width: 600px;
    aspect-ratio: 3 / 4;
    border-radius: 16px;
    overflow: hidden;
    position: relative; 
}

.full-media img,
.full-media video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* overlay buttons */
.overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    gap: 8px;
    padding: 12px;

    background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.75));
    opacity: 1; /* ALWAYS visible in scroll mode */
}

.overlay button {
    font-size: 12px;
    padding: 6px 10px;
}
</style>
</head>

<body>

<header>Larp Central</header>

<div class="topbar">
    <button onclick="loadContent('photos')">Photos</button>
    <button onclick="loadContent('videos')">Videos</button>
    <button onclick="loadContent('prompts')">Prompts</button>
    <button onclick="toggleMode()">Toggle Scroll Mode</button>
</div>

<!-- GRID -->
<div class="container grid" id="grid"></div>

<!-- FULLSCREEN VIEWER -->
<div class="viewer" id="viewer">

    <div class="sidebar">
        <button onclick="loadContent('photos')">Photos</button>
        <button onclick="loadContent('videos')">Videos</button>
        <button onclick="loadContent('prompts')">Prompts</button>
        <button onclick="toggleMode()">Exit</button>
    </div>

    <div class="feed" id="feed"></div>
</div>

<script>
const USER = "tyy-8";
const REPO = "larpcentral";
const BASE = `https://api.github.com/repos/${USER}/${REPO}/contents`;

let scrollMode = false;
let currentType = "photos";
let allData = [];

async function loadContent(type) {
    currentType = type;
    allData = [];

    const grid = document.getElementById("grid");
    const feed = document.getElementById("feed");

    grid.innerHTML = "Loading...";
    feed.innerHTML = "";

    const folderMap = {
        photos: "Photos",
        videos: "Videos",
        prompts: "Prompts"
    };

    const res = await fetch(`${BASE}/${folderMap[type]}`);
    const files = await res.json();

    grid.innerHTML = "";

    for (let file of files) {

        const card = document.createElement("div");
        card.className = "card";

        const feedItem = document.createElement("div");
        feedItem.className = "feed-item";

        // ================= PHOTOS =================
        if (type === "photos") {

            card.innerHTML = `
            <div class="media">
                <img src="${file.download_url}">
            </div>`;

            feedItem.innerHTML = `
            <div class="full-media">
                <img src="${file.download_url}">
                <div class="overlay">
                    <button onclick="downloadFile('${file.download_url}','${file.name}')">Download</button>
                    <button onclick="copyLink('${file.download_url}')">Copy</button>
                </div>
            </div>`;
        }

        // ================= VIDEOS =================
        if (type === "videos") {

            card.innerHTML = `
            <div class="media">
                <video src="${file.download_url}" muted loop></video>
            </div>`;
            feedItem.innerHTML = `
            <div class="full-media">
                <video class="feed-video" src="${file.download_url}" muted loop playsinline></video>
            
                <div class="overlay">
                    <button onclick="downloadFile('${file.download_url}','${file.name}')">Download</button>
                    <button onclick="copyLink('${file.download_url}')">Copy</button>
                </div>
            </div>`;
        }

        // ================= PROMPTS =================
        if (type === "prompts") {
            const txt = await fetch(file.download_url).then(r => r.text());
            const lines = txt.split("\n");

            card.innerHTML = `
            <div style="padding:12px">
                <h3>${lines[0]}</h3>
                <p style="opacity:0.7">${lines.slice(1).join(" ")}</p>
            </div>`;

            feedItem.innerHTML = card.innerHTML;
        }

        grid.appendChild(card);
        feed.appendChild(feedItem);
    }

    setupAutoPlay();
}

/* ================= AUTOPLAY ================= */
function setupAutoPlay() {
    const videos = document.querySelectorAll(".feed-video");

    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            const video = entry.target;

            if (entry.isIntersecting) {
                video.play();
            } else {
                video.pause();
            }
        });
    }, { threshold: 0.6 });

    videos.forEach(v => observer.observe(v));
}

/* ================= MODE TOGGLE ================= */
function toggleMode() {
    scrollMode = !scrollMode;
    document.getElementById("viewer").classList.toggle("active", scrollMode);
}

/* ================= DOWNLOAD (REAL FIX) ================= */
function downloadFile(url, filename) {
    fetch(url)
        .then(r => r.blob())
        .then(blob => {
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = blobUrl;
            a.download = filename || "download";
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(blobUrl);
        });
}

/* ================= COPY ================= */
function copyLink(url) {
    navigator.clipboard.writeText(url);
}

loadContent("photos");
</script>

</body>
</html>
